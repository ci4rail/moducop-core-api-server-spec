get:
  tags:
    - deployment
    - identification
  summary: Get deployment status and version of io4edge device firmware
  description: |-
    The currently active firmware version `current` is read at startup from the io4edge device
    and is updated with each successful firmware update.

    `deploy_status.code` reflects the status of the latest firmware update deployment:
    - never_deployed: Core API server has never seen a firmware update
    - already_deployed: the same firmware version is already deployed
    - in_progress: deployment is currently in progress
    - success: deployment completed successfully
    - failure: deployment failed

    `deploy_status.message` may contain additional information about the deployment status, e.g. error messages in case of failure.

  parameters:
    - name: devicename
      in: path
      required: true
      description: Name of the io4edge device
      schema:
        type: string
        example: S100-IUO16-USB-EXT1-UC1
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../../core-api-server.yml#/components/schemas/EntityStatus"
    "400":
      $ref: "../../responses/bad_request.yml"
    "500":
      $ref: "../../responses/internal_server_error.yml"

put:
  tags:
    - deployment
  summary: Load io4edge device firmware
  description: |-
    Load firmware to an io4edge device. Supply a `.fwpkg` file.

    The API returns immediately after the update process is started. Call
    GET /software/io4edge/{devicename} to check deployment status.

    If there is already a firmware update in progress on the same device, the API returns a 412 Precondition Failed error. 

    If the supplied artifact is invalid, the API returns a 400 Bad Request error. 

    If the same firmware version is already deployed, the API returns a 409 Conflict error.

    If the update installation succeeds, the io4edge device will reboot and the new firmware will be 
    active after the reboot (unless a rollback happens).

    Note that you can start multiple io4edge device firmware updates in parallel, the io4edge devices will update in parallel.

  parameters:
    - name: devicename
      in: path
      required: true
      description: Name of the io4edge device
      schema:
        type: string
        example: S100-IUO16-USB-EXT1-UC1
  requestBody:
    required: true
    content:
      application/octet-stream:
        schema:
          type: string
          format: binary
  responses:
    "202":
      description: Accepted, firmware update started
    "400":
      $ref: "../../responses/bad_request.yml"
    "409":
      $ref: "../../responses/conflict.yml"
    "412":
      $ref: "../../responses/precondition_failed.yml"
    "500":
      $ref: "../../responses/internal_server_error.yml"
