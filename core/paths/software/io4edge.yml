get:
  tags:
    - deployment
    - identification
  summary: Get Deployment Status and Version of io4Edge Device Firmware
  description: |-
    Get the deployment status and current version of io4Edge device firmware on a specific io4Edge device. 

  parameters:
    - name: device-name
      in: path
      description: |-
        Name of the io4Edge device
      required: true
      schema:
        type: string
        example: "S101-IOU16-USB-EXT1"

  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                description: |
                  Status of the deployment.
                  Can be "in_progress", "completed", "already_deployed", or "failed".
                type: string
                example: "in_progress"
              error:
                description: Error message if the deployment failed.
                type: string
                example: "firmware is not suitable for the device"
              current_version:
                description: Current version of the io4Edge device firmware running on the device.
                type: object
                properties:
                  name:
                    type: string
                    example: "fw_iou16_default"
                  version:
                    type: string
                    example: "1.0.0"
    "500":
      description: Error during firmware update
      $ref: "../../responses/internal_server_error.yml"


put:
  tags:
    - deployment
  summary: Load io4Edge Device Firmware
  description: |-
    Load firmware to the io4Edge device. Supply a `.fwpkg` file containing the firmware for the io4Edge device.
     
    If multiple io4Edge devices are connected to the Moducop device, this endpoint must be called for each device separately. 

    This API call does not wait until the firmware update process is completed. The API returns immediately after the firmware update process is started. Call the GET /software/io4edge/{device-name} endpoint to check the status of the deployment.
  
  parameters:
    - name: device-name
      in: path
      description: |-
        Name of the io4Edge device
      required: true
      schema:
        type: string
        example: "S101-IOU16-USB-EXT1"

  requestBody:
    content:
      application/x-tar:
        schema:
          type: string
          format: binary
  responses:
    "202":
      description: Accepted, firmware update started
    "412":
      description: Precondition failed, firmware update already in progress
    "500":
      description: Error during firmware update
      $ref: "../../responses/internal_server_error.yml"