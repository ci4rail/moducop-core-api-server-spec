get:
  tags:
    - deployment
    - identification
  summary: Get deployment status and version of Core OS firmware
  description: |-
    The currently active Core OS firmware version `current` is read from the target's filesystem.

    `deploy_status.code` reflects the status of the latest Core OS firmware update deployment:
    - never_deployed: Core API server has never seen a Core OS firmware update artifact, or the device has been reset to factory state.
    - waiting: deployment not yet started, waiting for application update to finish
    - in_progress: deployment is currently in progress
    - success: deployment completed successfully
    - failure: deployment failed

    `deploy_status.message` may contain additional information about the deployment status, e.g. error messages in case of failure.
  responses:
    "200":
      description: OK
      content:
        application/json:
          schema:
            $ref: "../../../core-api-server.yml#/components/schemas/EntityStatus"
    "400":
      $ref: "../../responses/bad_request.yml"
    "500":
      $ref: "../../responses/internal_server_error.yml"

put:
  tags:
    - deployment
  summary: Load Core OS firmware
  description: |-
    Start a Linux RootFS update. Supply a `.mender` file containing the Core OS firmware.

    The API returns immediately after the update process is started. Call GET /software/core-os
    to check deployment status.

    If there is already a core OS update in progress, the API returns a 412 Precondition Failed error. 
    
    If the supplied artifact is invalid, the API returns a 400 Bad Request error. 

    If the core OS update is already deployed, the API returns a 409 Conflict error.
    
    If there is an application update in progress, the update is deferred until the application update is finished. Status 202 Accepted is returned in this case. 

    If the update installation succeeds, the device will reboot and the new firmware will be active after the reboot (unless a rollback happens).

    Note that there is a dependency between application updates and core OS updates: if an application update is in progress, 
    a core OS update will not be started until the application update is finished. The API will return a 202 Accepted status code in this case, 
    and the core OS update will be started automatically after the application update is finished.

    No dependency exists between core OS updates and io4edge device updates.
  requestBody:
    required: true
    content:
      application/octet-stream:
        schema:
          type: string
          format: binary
  responses:
    "202":
      description: Accepted, firmware update started
    "400":
      $ref: "../../responses/bad_request.yml"
    "409":
      $ref: "../../responses/conflict.yml"
    "412":
      $ref: "../../responses/precondition_failed.yml"
    "500":
      $ref: "../../responses/internal_server_error.yml"
