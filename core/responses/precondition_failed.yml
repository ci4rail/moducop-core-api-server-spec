description: Precondition failed (update is already in progress)
content:
  application/json:
    schema:
      allOf:
        - $ref: "../../core-api-server.yml#/components/schemas/ErrorInfo"
        - type: object
          properties:
            code:
              type: string
              example: cpm-0002
            message:
              type: string
              example: an update is already in progress or waiting for entity core-os
