description: Conflict (requested version is already deployed)
content:
  application/json:
    schema:
      allOf:
        - $ref: "../../core-api-server.yml#/components/schemas/ErrorInfo"
        - type: object
          properties:
            code:
              type: string
              example: cpm-0005
            message:
              type: string
              example: the same version is already deployed for entity core-os
